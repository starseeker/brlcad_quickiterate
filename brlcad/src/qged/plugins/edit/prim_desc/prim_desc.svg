<?xml version="1.0" encoding="UTF-8"?>
<!-- Generic "primitive parameters" icon for the auto-widget edit panel.
     Depicts a small grid/table suggesting structured parameter editing.
     Public domain. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"
     width="64" height="64">
  <!-- Background rounded rectangle -->
  <rect x="4" y="4" width="56" height="56" rx="8" ry="8"
        fill="#3a7ebf" stroke="#1a4e8a" stroke-width="2"/>

  <!-- Horizontal dividers representing rows of parameters -->
  <line x1="10" y1="20" x2="54" y2="20" stroke="#ffffff" stroke-width="2.5"
        stroke-linecap="round"/>
  <line x1="10" y1="32" x2="54" y2="32" stroke="#ffffff" stroke-width="2.5"
        stroke-linecap="round"/>
  <line x1="10" y1="44" x2="54" y2="44" stroke="#ffffff" stroke-width="2.5"
        stroke-linecap="round"/>

  <!-- Vertical divider separating label from value columns -->
  <line x1="26" y1="10" x2="26" y2="54" stroke="#aaccee" stroke-width="1.5"
        stroke-linecap="round"/>

  <!-- Label column dots (parameter names) -->
  <rect x="10" y="12" width="12" height="6" rx="2" fill="#aaccee"/>
  <rect x="10" y="24" width="14" height="6" rx="2" fill="#aaccee"/>
  <rect x="10" y="36" width="10" height="6" rx="2" fill="#aaccee"/>
  <rect x="10" y="48" width="13" height="6" rx="2" fill="#aaccee"/>

  <!-- Value column filled rectangles (spin-box style) -->
  <rect x="29" y="12" width="23" height="6" rx="2" fill="#ffffff"/>
  <rect x="29" y="24" width="23" height="6" rx="2" fill="#ffffff"/>
  <rect x="29" y="36" width="23" height="6" rx="2" fill="#ffffff"/>
  <rect x="29" y="48" width="23" height="6" rx="2" fill="#ffffff"/>

  <!-- Small ▲▼ arrows on the last value box suggesting a spinbox -->
  <polygon points="50,27 53,30 47,30" fill="#3a7ebf"/>
  <polygon points="50,33 53,30 47,30" fill="#3a7ebf"/>
</svg>
